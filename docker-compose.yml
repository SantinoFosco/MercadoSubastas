services:

  db:
    image: postgres:15
    container_name: subastas_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mercado_subastas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./APIMercadoSubastas
    container_name: subastas_api
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/mercado_subastas
      DEV_MODE: "true"
      # Segundos sin pujas para cerrar un ítem. Bajar a 5 para testing rápido.
      AUCTION_ITEM_TIMEOUT: ${AUCTION_ITEM_TIMEOUT:-20}
    volumes:
      - ./APIMercadoSubastas:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
